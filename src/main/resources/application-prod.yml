spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/config_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:kafka:29092}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    hostname: config-service
    prefer-ip-address: false

server:
  port: 8087

logging:
  level:
    com.config: INFO
